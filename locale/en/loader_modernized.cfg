mdrn-embiggen-assemblers-sixteen=16%


[string-mod-setting-description]
mdrn-chute-mode-none=Chutes will not be created.
mdrn-chute-mode-basic=Basic chutes will be created.\nThey are gravity feed chutes and will continue to load items until the slot is full.\nThey do not support filters or respecting insert limits of machines.
mdrn-chute-mode-filtered=Advanced chutes allow filters, split-lane filters and can be configured to respect insert limits of machines.
mdrn-chute-direction-input=The chute can only load items from a belt into a container.
mdrn-chute-direction-input-output=The chute can load from a belt into a container or unload from a container onto a belt.
mdrn-enable-stacking-none=Loaders will not be able to stack items on to belts.
mdrn-enable-stacking-turbo-and-above=Only loaders faster than express will be able to stack items on to belts.\n\nRecipe inserter counts will be higher than 'None'.
mdrn-enable-stacking-all=All loaders will be able to stack items on to belts according to your level of stacking technology.\n\nRecipe inserter counts will be higher than 'None'.
mdrn-enable-stacking-stack-tier=Create a separate stack loader with individual recipe and technology.  This loader requires stack inserters and will be able to fill your fastest belt.
mdrn-keep-5d-loaders-none=Remove 5Dim's 1x2 and 1x1 loaders.  Only use loaders from Loaders Modernized.
mdrn-keep-5d-loaders-all=Keep both the 1x2 and 1x1 loaders from 5Dim's mods in addition to Loaders Modernized.
mdrn-keep-5d-loaders-1x2=Only keep the 1x2 loaders from 5Dim's mod in addition to Loaders Modernized.
mdrn-unlock-technology-separate=Loaders will have their own technology to unlock the recipe.
mdrn-unlock-technology-belt=Loader recipes will unlock on the same technology as other logistic items at the same tier.
mdrn-embiggen-assemblers-zero=Don't change the size of assemblers.
mdrn-embiggen-assemblers-eight=Embiggen assemblers by 8%
mdrn-embiggen-assemblers-sixteen=Embiggen assemblers by 16%

[strings]
mdrn-use-split-lanes=Split filters per lane
mdrn-use-wfs=Wait for full stack
mdrn-use-fill=Fill machine slots
mdrn-split-suffix=(Split)
mdrn-wfs-suffix=(Stack wait)
mdrn-fill-suffix=(Fill)
mdrn-add-loader-variants-tooltip=Add upgrade mappings for all loader variant entities that correspond to existing base loader upgrade pairs in this planner.
mdrn-remove-loader-variants-tooltip=Remove loader variant upgrade mappings whose base-tier pair is also present in this planner.
mdrn-compatibility-change=[color=yellow]Loaders Modernized[/color]: How compatibility with additional mods is provided has changed.  Mod authors can add support directly from their mod, or via an addon mod.
mdrn-compatibility-removed=[color=yellow]Loaders Modernized[/color]: It appears some loaders have been removed as a result.  All previously supported mods now have an 'addon' mod available.  Please report any issues to the Loaders Modernized discussion page.
mdrn-power-change=[color=yellow]Loaders Modernized[/color]: Power consumption increased.  Loaders will now consume at least one order of magnitude more power when active.  There is an option in mod settings to revert to the lower power consumption if desired.
mdrn-chute-direction-change=[color=yellow]Loaders Modernized[/color]: Chutes were intended to be used for loading items into containers only.  They are gravity chutes and have no circuitry to detect full machines.  They will fill until the slot is full.  A startup setting is available to make cutes capable of advanced features like filters and respecting insert limits.  Chutes unloading from containers onto belts have been detected in this save.  The runtime map setting has been adjusted to allow chutes to unload onto belts to prevent loss of functionality, but you may want to adjust your layout to avoid this if you want to use chutes as intended.
mdrn-compatibility-removed-2=[color=yellow]Loaders Modernized[/color]: [color=red]DO NOT SAVE[/color] It appears that some of your previous loaders have not been replaced with the new versions.  This likely means that compatibility mod has not been loaded, or a mod adding belt tiers that also added loaders from [color=yellow]Loaders Modernized[/color] needs to be updated.
mdrn-wfs-warning=[color=yellow]Loaders Modernized[/color]: We were a little over aggressive adding Wait-For-Full-Stack to your loaders in the last version.  If you want to remove it you can do so on the loaders individually.  There is also a command available to remove the flag from all mdrn loaders and ghosts on every surface.  [color=blue]/mdrn-remove-wfs[/color]\nYou will also want to check your mod settings to make sure the default behavior is set to your preference for any new loaders you place.

[command-help]
mdrn-remove-wfs=Remove the wait-for-full-stack flag from all mdrn loaders and ghosts on every surface.
