mdrn-chute-loader=Скат
mdrn-loader=Погрузчик
mdrn-fast-loader=Быстрый погрузчик
mdrn-express-loader=Экспресс-погрузчик
mdrn-turbo-loader=Турбо-погрузчик
mdrn-stack-loader=Пакетный погрузчик

[entity-description]
mdrn-chute-loader=Используется для медленной погрузки предметов в контейнер.
common=Используется для погрузки/выгрузки предметов со скоростью конвейера.
stack=\n\nЭтот погрузчик может выкладывать предметы на конвейер стопками.

