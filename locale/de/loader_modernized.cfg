mdrn-enable-stacking-all=Alle
mdrn-enable-stacking-stack-tier=Separater Stapel Belader
mdrn-keep-5d-loaders-none=Keine
mdrn-keep-5d-loaders-all=Alle
mdrn-keep-5d-loaders-1x2=Nur 1x2
mdrn-unlock-technology-separate=separate Technologie
mdrn-unlock-technology-belt=mit den Fließbändern
mdrn-embiggen-assemblers-zero=None
mdrn-embiggen-assemblers-eight=8%
mdrn-embiggen-assemblers-sixteen=16%

[string-mod-setting-description]
mdrn-chute-mode-none=Chutes will not be created.
mdrn-chute-mode-basic=Basic chutes will be created..
mdrn-chute-mode-filtered=Advanced chutes allow filters, split-lane filters and can be configured to overfill machines.
mdrn-chute-direction-input=The chute can only load items from a belt into a container.
mdrn-chute-direction-input-output=The chute can load from a belt into a container or unload from a container onto a belt.
mdrn-enable-stacking-none=Der Belader wird keine Gegenstände auf das Fließband stapeln können.
mdrn-enable-stacking-turbo-and-above=Turbo Belader (und höher) können Gegenstände auf Fließbändern stapeln, je nach Stufe der Stapeltechnologie.\n\nTurbo Belader (und höher) verwendet Stapelgreifarme in dem Rezept.
mdrn-enable-stacking-all=Alle Belader werden in der Lage sein, Gegenstände auf den Fließbändern entsprechend der Stapeltechnologie zu stapeln.\n\nDie Anzahl der Greifarme in dem Rezept wird steigen.
mdrn-enable-stacking-stack-tier=Erstellt einen separaten Stapel Belader mit individueller Rezeptur und Technologie.  Dieser Belader benötigt Stapelgreifarme und ist in der Lage, Ihr schnellstes Band zu füllen.
mdrn-keep-5d-loaders-none=entfernt 5Dim's 1x2, 1x1 Belader und benutzt nur die Belader von Loaders Modernized.
mdrn-keep-5d-loaders-all=berhält die 1x2 und 1x1 Belader von 5Dim's mods zusätzlich zu den Loaders Modernized Beladern.
mdrn-keep-5d-loaders-1x2=berhält nur die 1x2 Belader von 5Dim's mod zusätzlich zu den Loaders Modernized Beladern.
mdrn-unlock-technology-separate=Der Belader wird seine eigene Technologie haben um ihn frei zu schalten.
mdrn-unlock-technology-belt=Belader-Rezepte werden mit derselben Technologie freigeschaltet wie andere logistische Gegenstände der gleichen Stufe.
mdrn-embiggen-assemblers-zero=Don't change the size of assemblers.
mdrn-embiggen-assemblers-eight=Embiggen assemblers by 8%
mdrn-embiggen-assemblers-sixteen=Embiggen assemblers by 16%

[strings]
mdrn-use-split-lanes=getrennte Filter pro Spur
mdrn-use-wfs=Wait for full stack
mdrn-use-fill=Fill machine slots
mdrn-split-suffix=(Split)
mdrn-wfs-suffix=(Stack wait)
mdrn-fill-suffix=(Fill)
mdrn-add-loader-variants-tooltip=Add upgrade mappings for all loader variant entities that correspond to existing base loader upgrade pairs in this planner.
mdrn-remove-loader-variants-tooltip=Remove loader variant upgrade mappings whose base-tier pair is also present in this planner.
mdrn-compatibility-change=[color=red]Please read![/color]: Loaders Modernized has changed how it provides additional mod compatibility.  Mod authors can add support directly from their mod, or via an addon mod.
mdrn-compatibility-removed=[color=red]Loaders Removed - Don't save![/color]: It appears some loaders have been removed as a result.  All previously supported mods now have an 'addon' mod available.  Please report any issues to the Loaders Modernized discussion page.
mdrn-power-change=[color=red]Loader power consumption increase[/color]: Loaders Modernized will now consume at least one order of magnitude more power when active.  There is an option in mod settings to revert to the lower power consumption if desired.
mdrn-chute-direction-change=[color=yellow]Loaders Modernized[/color]: Chutes were intended to be used for loading items into containers only.  Chutes unloading from containers onto belts have been detected in this save.  The runtime map setting has been adjusted to allow chutes to unload onto belts to prevent loss of functionality, but you may want to adjust your layout to avoid this if you want to use chutes as intended.
mdrn-compatibility-removed-2=[color=yellow]Loaders Modernized[/color]: [color=red]DO NOT SAVE[/color] It appears that some of your previous loaders have not been replaced with the new versions.  This likely means that compatibility mod has not been loaded, or a mod adding belt tiers that also added loaders from [color=yellow]Loaders Modernized[/color] needs to be updated.
