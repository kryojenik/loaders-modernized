mdrn-use-electricity=Benutzt Strom
mdrn-double-recipe=Doppelte Belader
mdrn-chute-mode=Chute (and below) mode
mdrn-chute-direction=Chute (and below) direction
mdrn-enable-stack-loader=Stapel Belader einschalten
mdrn-enable-stacking=Bandstapelung einschalten
mdrn-cheap-stacking=Günstigere Stapel-Belader
mdrn-use-aai-graphics=Benutze AAI Loaders Grafik
mdrn-use-aai-recipes=AAI Industry Rezepe benutzen
mdrn-keep-5d-loaders=5Dim's Belader berhalten
mdrn-keep-turbo-loader=Turbo Belader berhalten
mdrn-unlock-technology=Freischalten mit Logistik
mdrn-embiggen-assemblers=Embiggen assemblers
mdrn-oplp=Legacy power usage
