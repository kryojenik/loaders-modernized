[mod-name]
loaders-modernized=Loaders modernized

[mod-description]
loaders-modernized=Kompakte 1x1 Belader, die zum Betrieb Strom benötigen. Es gibt Optionen zum Einschalten oder modifizieren von Eigenschaften, wie zum Beispiel das Stapeln, ausschalten des Stromverbrauches oder kosten des Rezeptes.

[entity-name]
mdrn-chute-loader=Laderutsche
mdrn-loader=Belader
mdrn-fast-loader=Schneller Belader
mdrn-express-loader=Express Belader
mdrn-turbo-loader=Turbo Belader
mdrn-stack-loader=Stapel Belader

[entity-description]
mdrn-chute-loader=Zum langsamen befüllen von Gegenständen in einen Behälter.
common=Dient zum Laden von Gegenständen ein/aus Containern bei Bandgeschwindigkeit.
stack=\n\nDieser Belader kann Gegenstände auf Fließbändern stapeln.

[technology-name]
mdrn-loader=__ENTITY__mdrn-loader__
mdrn-fast-loader=__ENTITY__mdrn-fast-loader__
mdrn-express-loader=__ENTITY__mdrn-express-loader__
mdrn-turbo-loader=__ENTITY__mdrn-turbo-loader__
mdrn-stack-loader=__ENTITY__mdrn-stack-loader__

[technology-description]
common=Schaltet den Belader für das schnelle beladen von Fließbändern frei.

